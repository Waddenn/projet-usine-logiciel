apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: projet-etude-app-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: projet-etude-app-demo
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
