apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: projet-etude-app-demo
  annotations:
    # Traefik k3s : entrypoint HTTP (web). Tailscale-serve gère le TLS en amont.
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: projet-etude-app-demo
                port:
                  number: 80
