apiVersion: v1
kind: ConfigMap
metadata:
  name: projet-etude-app-demo-dashboard
  labels:
    grafana_dashboard: "1"
data:
  app-demo.json: |
    {
      "title": "App demo — Tracker d'incidents",
      "uid": "projet-etude-app-demo",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "tags": ["projet-etude", "metier"],
      "timezone": "browser",
      "panels": [
        {
          "id": 10,
          "title": "Incidents ouverts",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "options": { "colorMode": "value", "graphMode": "area" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 20 },
                  { "color": "red",    "value": 50 }
                ]
              }
            }
          },
          "targets": [
            { "expr": "max(tickets_open{namespace=\"projet-etude-app-demo\"})", "refId": "A" }
          ]
        },
        {
          "id": 11,
          "title": "Créations / min (par priorité)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 9, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "sum by (priority) (rate(tickets_created_total{namespace=\"projet-etude-app-demo\"}[5m])) * 60",
              "legendFormat": "{{priority}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "title": "Total fermés",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 15, "y": 0 },
          "targets": [
            { "expr": "max(tickets_closed_total{namespace=\"projet-etude-app-demo\"})", "refId": "A" }
          ]
        },
        {
          "id": 13,
          "title": "Latence DB p95 (s) par opération",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, op) (rate(db_query_duration_seconds_bucket{namespace=\"projet-etude-app-demo\"}[5m])))",
              "legendFormat": "{{op}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 1,
          "title": "Requests / s (par status)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 15, "x": 9, "y": 4 },
          "targets": [
            {
              "expr": "sum by (status) (rate(http_requests_total{namespace=\"projet-etude-app-demo\"}[1m]))",
              "legendFormat": "{{status}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Latence HTTP p95 (s) par path",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, path) (rate(http_request_duration_seconds_bucket{namespace=\"projet-etude-app-demo\"}[1m])))",
              "legendFormat": "{{path}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Replicas (HPA)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas{namespace=\"projet-etude-app-demo\",deployment=\"projet-etude-app-demo\"}",
              "legendFormat": "ready",
              "refId": "A"
            },
            {
              "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"projet-etude-app-demo\"}",
              "legendFormat": "desired",
              "refId": "B"
            }
          ]
        },
        {
          "id": 4,
          "title": "CPU pods (cores)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"projet-etude-app-demo\",container=\"app\"}[1m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
