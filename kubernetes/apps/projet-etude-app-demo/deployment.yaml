apiVersion: apps/v1
kind: Deployment
metadata:
  name: projet-etude-app-demo
  labels:
    app.kubernetes.io/name: projet-etude-app-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: projet-etude-app-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: projet-etude-app-demo
    spec:
      securityContext:
        runAsNonRoot: true
        # UID 65532 = "nonroot" dans gcr.io/distroless/static. Explicite pour
        # satisfaire runAsNonRoot (kubelet ne peut pas résoudre un user nommé).
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/waddenn/projet-etude-app-demo:main
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ticketdb-app
                  key: uri
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits:   { cpu: 500m, memory: 128Mi }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
