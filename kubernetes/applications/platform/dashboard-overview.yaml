apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  platform-overview.json: |
    {
      "title": "Plateforme — vue d'ensemble",
      "uid": "platform-overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "tags": ["projet-etude", "platform"],
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Nœuds prêts",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "targets": [
            { "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})", "refId": "A" }
          ],
          "options": { "colorMode": "value", "graphMode": "none" },
          "fieldConfig": { "defaults": { "thresholds": { "steps": [
            { "color": "red", "value": null },
            { "color": "green", "value": 3 }
          ] } } }
        },
        {
          "id": 2,
          "title": "Pods en cours d'exécution",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "targets": [
            { "expr": "sum(kube_pod_status_phase{phase=\"Running\"})", "refId": "A" }
          ]
        },
        {
          "id": 3,
          "title": "Pods en échec",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "targets": [
            { "expr": "sum(kube_pod_status_phase{phase=~\"Failed|Unknown\"})", "refId": "A" }
          ],
          "fieldConfig": { "defaults": { "thresholds": { "steps": [
            { "color": "green", "value": null },
            { "color": "red", "value": 1 }
          ] } } }
        },
        {
          "id": 4,
          "title": "Pods en attente",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "targets": [
            { "expr": "sum(kube_pod_status_phase{phase=\"Pending\"})", "refId": "A" }
          ]
        },
        {
          "id": 5,
          "title": "Namespaces",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
          "targets": [
            { "expr": "count(kube_namespace_labels)", "refId": "A" }
          ]
        },
        {
          "id": 6,
          "title": "Replicas non-prêts (deployments)",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
          "targets": [
            { "expr": "sum(kube_deployment_status_replicas - kube_deployment_status_replicas_ready)", "refId": "A" }
          ],
          "fieldConfig": { "defaults": { "thresholds": { "steps": [
            { "color": "green", "value": null },
            { "color": "red", "value": 1 }
          ] } } }
        },
        {
          "id": 7,
          "title": "CPU par namespace (cores)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=\"\",container!=\"POD\"}[2m]))",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Mémoire par namespace (bytes)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\",container!=\"POD\"})",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 9,
          "title": "Charge CPU par nœud (%)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[2m])) * 100)",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percent", "max": 100, "min": 0 } }
        },
        {
          "id": 10,
          "title": "Mémoire utilisée par nœud (%)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percent", "max": 100, "min": 0 } }
        },
        {
          "id": 11,
          "title": "Restarts containers (5m)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total[5m])) > 0",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
