apiVersion: v1
kind: Service
metadata:
  name: traefik-web-ext
  namespace: kube-system
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik-kube-system
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik-kube-system
  ports:
    - name: web
      port: 80
      protocol: TCP
      targetPort: web
      nodePort: 30880
