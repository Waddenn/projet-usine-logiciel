apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
    chart: infisical-standalone
    targetRevision: 1.8.0
    helm:
      releaseName: infisical
      values: |
        infisical:
          # Le Secret est généré déclarativement par sops-nix
          # (cf. nixos/modules/secrets.nix template "infisical-secrets.yaml").
          kubeSecretRef: "infisical-secrets"
          replicaCount: 1
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 800Mi }
          service:
            type: ClusterIP
          autoBootstrap:
            enabled: false

        # Pas d'Ingress dans le lab — exposition via NodePort (extras) +
        # tailscale serve. À activer si on intègre un Ingress controller.
        ingress:
          enabled: false
          nginx:
            enabled: false

        postgresql:
          enabled: true
          auth:
            username: infisical
            password: change-me-localpostgres
            database: infisicalDB
          primary:
            persistence:
              enabled: true
              storageClass: local-path
              size: 5Gi
            resources:
              requests: { cpu: 50m, memory: 128Mi }
              limits:   { memory: 512Mi }

        redis:
          enabled: true
          auth:
            password: change-me-localredis
          master:
            persistence:
              enabled: true
              storageClass: local-path
              size: 1Gi
            resources:
              requests: { cpu: 20m, memory: 64Mi }
              limits:   { memory: 128Mi }
          replica:
            replicaCount: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
