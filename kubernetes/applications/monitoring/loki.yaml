apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.16.0
    helm:
      releaseName: loki
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
            retention_period: 168h
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: local-path
            size: 10Gi
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 512Mi }
        # Désactive les composants distribués (mode SingleBinary).
        backend: { replicas: 0 }
        read:    { replicas: 0 }
        write:   { replicas: 0 }
        ingester:      { replicas: 0 }
        querier:       { replicas: 0 }
        queryFrontend: { replicas: 0 }
        queryScheduler:{ replicas: 0 }
        distributor:   { replicas: 0 }
        compactor:     { replicas: 0 }
        indexGateway:  { replicas: 0 }
        ruler:         { replicas: 0 }
        # Cache désactivé pour limiter la conso RAM (3-node lab).
        chunksCache:   { enabled: false }
        resultsCache:  { enabled: false }
        # Gateway nginx en frontal (utilisé par Grafana datasource et Alloy).
        gateway:
          enabled: true
          replicas: 1
          resources:
            requests: { cpu: 20m, memory: 64Mi }
            limits:   { memory: 128Mi }
        test: { enabled: false }
        lokiCanary: { enabled: false }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
