apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.5.1
    helm:
      releaseName: kube-prometheus-stack
      values: |
        crds:
          enabled: true
        defaultRules:
          create: true
        alertmanager:
          enabled: true
          alertmanagerSpec:
            resources:
              requests: { cpu: 20m, memory: 64Mi }
              limits:   { memory: 128Mi }
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources: { requests: { storage: 1Gi } }
            # Monte le Secret généré par sops-nix (modules/secrets.nix) sous
            # /etc/alertmanager/secrets/alertmanager-discord-webhook/.
            secrets:
              - alertmanager-discord-webhook
          config:
            global:
              resolve_timeout: 5m
            route:
              receiver: discord
              group_by: ["alertname", "namespace", "severity"]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              routes:
                - matchers: ['alertname = "Watchdog"']
                  receiver: "null"
            receivers:
              - name: "null"
              - name: discord
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-discord-webhook/webhook-url
                    channel: "#alerts"
                    send_resolved: true
                    title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
                    text: |
                      {{ range .Alerts }}
                      *severity:* {{ .Labels.severity }}
                      *namespace:* {{ .Labels.namespace }}
                      *summary:* {{ .Annotations.summary }}
                      *description:* {{ .Annotations.description }}
                      {{ end }}
        prometheus:
          prometheusSpec:
            retention: 7d
            resources:
              requests: { cpu: 100m, memory: 512Mi }
              limits:   { memory: 1Gi }
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources: { requests: { storage: 10Gi } }
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
        grafana:
          adminPassword: admin
          service:
            type: NodePort
            nodePort: 30030
          persistence:
            enabled: true
            storageClassName: local-path
            size: 2Gi
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 256Mi }
          # Le disque local-path des VMs Proxmox est lent : les migrations SQLite
          # peuvent dépasser 2 min. On laisse 5 min au démarrage avant que la
          # liveness probe ne kille le pod.
          startupProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet: { path: /api/health, port: 3000 }
            periodSeconds: 30
            failureThreshold: 6
            timeoutSeconds: 5
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
            datasources:
              enabled: true
              searchNamespace: ALL
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki-gateway.monitoring.svc.cluster.local
              access: proxy
        kubeEtcd:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
