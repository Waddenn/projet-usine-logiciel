apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kepler
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://sustainable-computing-io.github.io/kepler-helm-chart
    chart: kepler
    targetRevision: 0.5.12
    helm:
      releaseName: kepler
      values: |
        # DaemonSet privilégié — eBPF pour lire les compteurs RAPL/ACPI.
        # Sur VMs Proxmox sans access RAPL direct, Kepler bascule en mode
        # estimation par modèle ML (pré-entraîné, embarqué).
        image:
          tag: release-0.7.12
        extraEnvVars:
          KEPLER_LOG_LEVEL: "1"
          ENABLE_GPU: "false"
          # En VM, force l'estimation par modèle (pas de RAPL hôte).
          MODEL_CONFIG: |
            CONTAINER_COMPONENTS_ESTIMATOR=true
            CONTAINER_PLATFORM_POWER_ESTIMATOR=true
        serviceMonitor:
          enabled: true
          interval: 30s
          labels: {}
        resources:
          requests: { cpu: 50m, memory: 128Mi }
          limits:   { cpu: 200m, memory: 256Mi }
        # Exposition via Service (scrape par kube-prometheus-stack via ServiceMonitor).
        service:
          enabled: true
          type: ClusterIP
          port: 9102
  destination:
    server: https://kubernetes.default.svc
    namespace: kepler
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
