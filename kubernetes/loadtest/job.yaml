apiVersion: batch/v1
kind: Job
metadata:
  name: loadtest-app-demo
  namespace: projet-etude-app-demo
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loadtest-app-demo
    spec:
      restartPolicy: Never
      containers:
        - name: hey
          image: ghcr.io/rakyll/hey:latest
          args:
            - -z
            - 90s
            - -c
            - "60"
            - -q
            - "200"
            - http://projet-etude-app-demo.projet-etude-app-demo.svc.cluster.local/
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits:   { cpu: 500m, memory: 128Mi }
